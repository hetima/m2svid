data:
  target: m2svid.data.lightning_datasets.Stereo4dLightningDataset
  params:
    batch_size: 2
    num_workers: 8

    train_kwargs: {}

    eval_kwargs: {}

    common_kwargs:
      split: test
      metadata_path: datasets/stereo4d/subsets/test.json
      spatial_transform_type: resize_center_crop
      fps: 5
      frame_number: 16
      resolution: [512, 512]

      data_root: datasets/stereo4d
      reprojected_root: datasets/stereo4d/reprojected
      mask_root: datasets/stereo4d//reprojected_mask

      reprojected_closing_holes_kernel: 11

      left_condition_view: true
      return_reprojected: true
      ensure_correct: true
      mask_antialias: false
