data:
  target: m2svid.data.lightning_datasets.Ego4dStereo4dLightningDataset
  params:
    batch_size: 1
    num_workers: 8


    train_kwargs:
      ego4d:
        split: train
        metadata_path: datasets/ego4d/subsets/train.json
        spatial_transform_type: random_resize_crop
        resize_scale: [0.3, 1.0]
        fake_dataset_size: 20000 # bs = 16 --> 2500 iter
        use_random_index: true

        rectified: true
        data_root: datasets/ego4d/preprocessed_videos/clips/cropped_videos
        reprojected_root: datasets/ego4d/preprocessed_videos/clips/reprojected
        mask_root: datasets/ego4d/preprocessed_videos/clips/reprojected_mask


        fps: [5, 30]
        frame_number: [4, 16, 25]
        resolution: [[512, 512], [256, 256], [192, 192]]

      stereo4d:
        split: train
        metadata_path: datasets/stereo4d/subsets/train.json
        spatial_transform_type: random_resize_crop
        resize_scale: [0.3, 1.0]
        fake_dataset_size: 20000 # bs = 16 --> 2500 iter
        use_random_index: true

        data_root: datasets/stereo4d
        reprojected_root: datasets/stereo4d/reprojected
        mask_root: datasets/stereo4d//reprojected_mask

        fps: [5, 30]
        frame_number: [4, 16, 25]
        resolution: [[512, 512], [256, 256], [192, 192]]

    eval_kwargs:
      split: test
      metadata_path: datasets/stereo4d/subsets/val_64clips.json
      spatial_transform_type: center_crop
      data_root: datasets/stereo4d
      reprojected_root: datasets/stereo4d/reprojected
      mask_root: datasets/stereo4d//reprojected_mask
      fps: 5
      frame_number: 25
      resolution: [512, 512]

    common_kwargs:
      reprojected_closing_holes_kernel: 11
      left_condition_view: true
      return_reprojected: true
      ensure_correct: true
      mask_antialias: false

model:
  target: m2svid.models_for_sgm.m2svid_model.VideoLDM
  base_learning_rate: 2e-6
  params:
    input_key: video
    scale_factor: 0.18215
    log_keys: caption
    num_samples: 25
    trained_param_keys: [all]
    # en_and_decode_n_samples_a_time: 16
    disable_first_stage_autocast: True
    ckpt_path: ckpts/m2svid_weights.pt 
    cond_video_2nd_view: True
    cond_reprojected_video: True

    clip_condition_all_frames: True

    apply_loss_on_images: True

    denoiser_config:
      target: sgm.modules.diffusionmodules.denoiser.Denoiser
      params:
        scaling_config:
          target: sgm.modules.diffusionmodules.denoiser_scaling.VScalingWithEDMcNoise

    network_config:
      target: sgm.modules.diffusionmodules.video_model.VideoUNet
      params:
        adm_in_channels: 768
        num_classes: sequential
        use_checkpoint: True
        in_channels: 13
        out_channels: 4
        model_channels: 320
        attention_resolutions: [4, 2, 1]
        num_res_blocks: 2
        channel_mult: [1, 2, 4, 4]
        num_head_channels: 64
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        spatial_transformer_attn_type: softmax-xformers
        extra_ff_mix_layer: True
        use_spatial_context: True
        merge_strategy: learned_with_images
        video_kernel_size: [3, 1, 1]
        attn_inpainting_strategy: spatial_full_attention

    conditioner_config:
      target: sgm.modules.GeneralConditioner
      params:
        emb_models:
          # crossattn cond (1024)
          - is_trainable: False
            input_key: cond_frames_without_noise
            # ucg_rate: 0.1
            target: sgm.modules.encoders.modules.FrozenOpenCLIPImagePredictionEmbedder
            params:
              n_cond_frames: 1
              n_copies: 1
              open_clip_embedding_config:
                target: sgm.modules.encoders.modules.FrozenOpenCLIPImageEmbedder
                params:
                  version: "ckpts/open_clip_pytorch_model.bin"
                  freeze: True

          # vector cond (256)
          - input_key: fps_id
            is_trainable: False
            target: sgm.modules.encoders.modules.ConcatTimestepEmbedderND
            params:
              outdim: 256

          # vector cond (256)
          - input_key: motion_bucket_id
            is_trainable: False
            target: sgm.modules.encoders.modules.ConcatTimestepEmbedderND
            params:
              outdim: 256

          # concat cond (4)
          - input_key: cond_video_2nd_view
            is_trainable: False
            # ucg_rate: 0.1
            target: sgm.modules.encoders.modules.VideoPredictionEmbedderWithEncoder
            params:
              disable_encoder_autocast: True
              n_cond_frames: 1
              n_copies: 1
              is_ae: True
              encoder_config:
                target: sgm.models.autoencoder.AutoencoderKLModeOnly
                params:
                  embed_dim: 4
                  monitor: val/rec_loss
                  ddconfig:
                    attn_type: vanilla-xformers
                    double_z: True
                    z_channels: 4
                    resolution: 256
                    in_channels: 3
                    out_ch: 3
                    ch: 128
                    ch_mult: [1, 2, 4, 4]
                    num_res_blocks: 2
                    attn_resolutions: []
                    dropout: 0.0
                  lossconfig:
                    target: torch.nn.Identity

          # vector cond (256)
          - input_key: cond_aug
            is_trainable: False
            target: sgm.modules.encoders.modules.ConcatTimestepEmbedderND
            params:
              outdim: 256

          # concat cond (4)
          - input_key: cond_reprojected_video
            is_trainable: False
            # ucg_rate: 0.1
            target: sgm.modules.encoders.modules.VideoPredictionEmbedderWithEncoder
            params:
              disable_encoder_autocast: True
              n_cond_frames: 1
              n_copies: 1
              is_ae: True
              encoder_config:
                target: sgm.models.autoencoder.AutoencoderKLModeOnly
                params:
                  embed_dim: 4
                  monitor: val/rec_loss
                  ddconfig:
                    attn_type: vanilla-xformers
                    double_z: True
                    z_channels: 4
                    resolution: 256
                    in_channels: 3
                    out_ch: 3
                    ch: 128
                    ch_mult: [1, 2, 4, 4]
                    num_res_blocks: 2
                    attn_resolutions: []
                    dropout: 0.0
                  lossconfig:
                    target: torch.nn.Identity

          # concat cond (1)
          - input_key: reprojected_mask
            is_trainable: False
            target: m2svid.models_for_sgm.embedders.ConcatEmbedder
            params: {}

    first_stage_config:
      target: sgm.models.autoencoder.AutoencodingEngine
      params:
        loss_config:
          target: torch.nn.Identity
        regularizer_config:
          target: sgm.modules.autoencoding.regularizers.DiagonalGaussianRegularizer
        encoder_config:
          target: sgm.modules.diffusionmodules.model.Encoder
          params:
            attn_type: vanilla
            double_z: True
            z_channels: 4
            resolution: 256
            in_channels: 3
            out_ch: 3
            ch: 128
            ch_mult: [1, 2, 4, 4]
            num_res_blocks: 2
            attn_resolutions: []
            dropout: 0.0
        decoder_config:
          target: sgm.modules.autoencoding.temporal_ae.VideoDecoder
          params:
            attn_type: vanilla
            double_z: True
            z_channels: 4
            resolution: 256
            in_channels: 3
            out_ch: 3
            ch: 128
            ch_mult: [1, 2, 4, 4]
            num_res_blocks: 2
            attn_resolutions: []
            dropout: 0.0
            video_kernel_size: [3, 1, 1]

    loss_fn_config:
      target:  m2svid.models_for_sgm.one_step_model_utils.OneStepLoss
      params:
        loss_type: 'l2'
        image_loss_types: ['lpips', 'l1']
        num_frames: 25
        batch2model_keys: [num_video_frames, image_only_indicator, inpainting_mask]
        sigma_sampler_config:
          target: m2svid.models_for_sgm.one_step_model_utils.OneStepSampling
          params:
            sigma: 700.0
        loss_weighting_config:
          target: sgm.modules.diffusionmodules.loss_weighting.VWeighting

    sampler_config:
      target: sgm.modules.diffusionmodules.sampling.EulerEDMSampler
      params:
        num_steps: 1
        verbose: False
        denoise_from_zero: True

        discretization_config:
          target: sgm.modules.diffusionmodules.discretizer.EDMDiscretization
          params:
            sigma_max: 700.0
            spacing: 'trailing'

        guider_config:
          target: sgm.modules.diffusionmodules.guiders.LinearPredictionGuider
          params:
            num_frames: 25
            max_scale: 1.0
            min_scale: 1.0

lightning:
  trainer:
    gpus: "0,1,2,3,4,5,6,7"
    logger_refresh_rate: 10
    val_check_interval: 5000
    log_every_n_steps: 10
    max_epochs: 120
    accelerator: gpu
    strategy: deepspeed_stage_2
    precision: 16
    accumulate_grad_batches: 2
    gradient_clip_val: 1
    gradient_clip_algorithm: 'norm'

  callbacks:
    image_logger:
      target: vtdm.callbacks.VideoLogger
      params:
        log_on_batch_idx: True
        increase_log_steps: False
        log_first_step: True
        batch_frequency: 200
        # batch_frequency: 1


    metrics_over_trainsteps_checkpoint:
      target: pytorch_lightning.callbacks.ModelCheckpoint
      params:
        every_n_train_steps: 5000
        save_weights_only: False
